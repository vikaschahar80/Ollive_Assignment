version: '3.8'

services:
  # 1. PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: ollive-postgres
    restart: always
    environment:
      POSTGRES_DB: ollive_logging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ollive_logging"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. Redis queue backend for asynchronous events
  redis:
    image: redis:7-alpine
    container_name: ollive-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 3. Express + BullMQ Ingestion Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ollive-backend
    restart: always
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/ollive_logging
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - INGESTION_ENDPOINT=http://backend:5001/api/ingest
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # 4. Vite React Frontend Nginx Host
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ollive-frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
